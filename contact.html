    <body>
        <main class="main">
            <div class="main_container">
                <div class="container1">
                    <h1>
                        ¿Quieres contactar conmigo? Adelante.
                    </h1>
                    <form action="">
                        <div class="form">
                            <div class="grupo">
                                <label>Nombre</label>
                                <input type="text" name="" id="" required><span class="barra"></span>
                                
                            </div>
                            <div class="grupo">
                                <label>Email</label>
                                <input type="email" name="" id="" required><span class="barra"></span>
                                
                            </div>
                            <div class="grupo">
                                <label>Mensaje</label>
                                <textarea name="" id="" rows="3" required></textarea><span class="barra"></span>
                                
                            </div>
                            <button type="submit">Suscribete</button>
                        </div>
                    </form>
                    
                </div>
                
            </div>
